version: '3.8'

services:
  builder:
    build:
      context: .
      target: builder
    image: 3dgs-ar-builder:latest
    volumes:
      - ./data:/app/data

  web_demo:
    build:
      context: .
      target: web_demo
    image: 3dgs-ar-web-demo:latest
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PORT=8000
