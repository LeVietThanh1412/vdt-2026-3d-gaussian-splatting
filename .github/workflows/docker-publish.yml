name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up BuildKit Docker-container builder to build multi-platform images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login against a Docker registry except on PR
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker images
      - name: Extract Docker metadata for Builder
        id: meta-builder
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-builder

      - name: Extract Docker metadata for Web Demo
        id: meta-web-demo
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web-demo

      # Build and push Docker image with Buildx (only push if not PR)
      - name: Build and push Builder Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-builder.outputs.tags }}
          labels: ${{ steps.meta-builder.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web Demo Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: web_demo
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web-demo.outputs.tags }}
          labels: ${{ steps.meta-web-demo.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
