<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3DGS AR Pipeline Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --viettel-red: #ED1C24;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Mặc định trên PC: 2 cột ngang */
        .sidebar {
            width: 360px;
            padding: 40px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 25px;
            background: rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
            z-index: 10;
        }

        .main-view {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #1a0505 0%, #050505 70%);
        }

        model-viewer {
            width: 100%;
            height: 100%;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
        }

        .title span {
            color: var(--viettel-red);
        }

        .subtitle {
            color: var(--text-muted);
            margin-top: 5px;
        }

        select {
            width: 100%;
            padding: 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
            box-sizing: border-box;
        }

        select:hover {
            border-color: var(--viettel-red);
        }

        /* THÊM ĐOẠN NÀY ĐỂ FIX LỖI NỀN TRẮNG CHỮ TRẮNG */
        select option {
            background-color: #050505; /* Màu nền đen (cùng màu bg của trang) */
            color: #ffffff;            /* Chữ màu trắng */
            padding: 10px;             /* Cách lề cho dễ bấm */
        }

        .guide-box {
            background: var(--glass);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            line-height: 1.6;
        }

        h4 {
            margin-top: 0;
            color: var(--viettel-red);
        }

        .action-buttons {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            flex-direction: column;
            z-index: 1000;
        }

        button {
            background: var(--viettel-red);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(237, 28, 36, 0.3);
            transition: all 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #record-btn {
            background: #ffffff;
            color: #050505;
        }

        /* FIX CHO MOBILE (IPHONE/ANDROID) */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
                overflow-x: hidden;
            }

            .sidebar {
                width: 100%;
                padding: 20px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .main-view {
                width: 100%;
                height: 60vh;
                flex: none;
            }

            .action-buttons {
                bottom: 15px;
                right: 15px;
                left: 15px;
                flex-direction: row;
                justify-content: space-between;
            }

            button {
                padding: 12px;
                font-size: 14px;
                flex: 1;
                text-align: center;
            }

            .guide-box {
                display: none;
            }

            /* Ẩn bớt hướng dẫn trên mobile cho gọn */
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div>
            <div class="title">3DGS <span>AR</span> Viewer</div>
            <div class="subtitle">Pipeline tối ưu hóa dữ liệu</div>
        </div>
        <select id="model-selector">
            <option>Đang quét thư mục output...</option>
        </select>
        <div class="guide-box">
            <h4>Cấu trúc Mesh</h4>
            <ul style="padding-left: 20px; color: var(--text-muted)">
                <li><b>Occlusion:</b> Che khuất ảo</li>
                <li><b>NavMesh:</b> Nhận diện sàn</li>
            </ul>
        </div>
    </aside>

    <main class="main-view">
        <model-viewer id="viewer" with-credentials ar ar-modes="webxr scene-viewer quick-look" camera-controls
            auto-rotate environment-image="neutral" shadow-intensity="1" scale="1 1 1">
            <div class="action-buttons">
                <button id="record-btn">🎥 Quay Web</button>
                <button id="ar-trigger">🚀 Mở AR</button>
            </div>
        </model-viewer>
    </main>

    <script>
        const selector = document.getElementById('model-selector');
        const viewer = document.getElementById('viewer');

        async function loadModels() {
            try {
                // Thêm header để ép Ngrok bỏ qua trang cảnh báo
                const res = await fetch('/api/models', {
                    headers: {
                        'ngrok-skip-browser-warning': 'true'
                    }
                });
                const models = await res.json();
                selector.innerHTML = models.map(m => `<option value="/data/output/${m}">${m}</option>`).join('');
                if (models.length > 0) {
                    viewer.src = selector.value;
                }
            } catch (e) {
                selector.innerHTML = "<option>Lỗi tải model (Ngrok chặn)!</option>";
                console.error(e);
            }
        }

        selector.onchange = (e) => viewer.src = e.target.value;
        loadModels();

        viewer.addEventListener('load', () => {
            if (viewer.model && viewer.model.materials) {
                viewer.model.materials.forEach(m => m.setDoubleSided(true));
            }
        });

        // Kích hoạt AR
        document.getElementById('ar-trigger').addEventListener('click', () => {
            if (viewer.canActivateAR) {
                viewer.activateAR();
            } else {
                alert("Máy không hỗ trợ AR hoặc sếp chưa cho phép truy cập Camera!");
            }
        });

        // Quay Video
        let mediaRecorder;
        let recordedChunks = [];
        document.getElementById('record-btn').addEventListener('click', async () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                document.getElementById('record-btn').textContent = '🎥 Quay Web';
            } else {
                try {
                    const canvas = viewer.shadowRoot.querySelector('canvas');
                    if (!canvas) return;
                    const stream = canvas.captureStream(30);
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    recordedChunks = [];
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `3DGS_Demo_${new Date().getTime()}.webm`;
                        a.click();
                        URL.revokeObjectURL(url);
                    };
                    mediaRecorder.start();
                    document.getElementById('record-btn').textContent = '⏹ Dừng Quay';
                } catch (err) { alert("Trình duyệt không hỗ trợ quay video."); }
            }
        });
    </script>
</body>

</html>
